# =============================================================================
#  MAMPOSTERA v0.5.4 — CI/CD Pipeline
#  Fix historial:
#    v1: Permission denied en platform-tools (pre-crear dirs)
#    v2: "Anchor version not set" (GITHUB_PATH mismo step)
#    v3: cp sin -r omitía subdirectorios
#    v4: AVM con --tag fallaba / anchor-cli desde crates.io
#    v5: DEFINITIVO — time v0.3.29 incompatible con Rust >= 1.78
#        Solución: pinear Rust a 1.77.0 (última versión compatible)
#        anchor-cli 0.30.1 requiere Rust <= 1.77 por dependencia time v0.3.29
# =============================================================================

name: Mampostera CI v0.5

on:
  push:
    branches: [main, develop, release]
  pull_request:
    branches: [main]

env:
  SOLANA_VERSION: "1.18.16"
  ANCHOR_VERSION:  "0.30.1"
  NODE_VERSION:    "20"
  # CRÍTICO: Rust 1.77.0 es la última versión compatible con anchor-cli 0.30.1
  # anchor-cli 0.30.1 depende de time v0.3.29 que NO compila con Rust >= 1.78
  # (error E0282: type annotations needed for Box<_>)
  RUST_VERSION:    "1.77.0"

jobs:
  # ─── Job 1: Auditoría de seguridad ─────────────────────────────────────────
  security-audit:
    name: Security audit (Rust + Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Audit Rust dependencies
        run: |
          cargo install cargo-audit --locked 2>/dev/null || true
          cargo audit --ignore RUSTSEC-2024-0344 --ignore RUSTSEC-2022-0093
        continue-on-error: true

      - name: Audit Node dependencies
        run: npm audit --audit-level=high
        working-directory: frontend
        continue-on-error: true

  # ─── Job 2: Build y test del programa Anchor ───────────────────────────────
  test-program:
    name: Anchor program tests
    runs-on: ubuntu-latest
    needs: security-audit

    steps:
      - uses: actions/checkout@v4

      # PASO CRÍTICO: instalar Rust 1.77.0 ANTES del cache
      # para que el cache key incluya la versión correcta
      - name: Install Rust 1.77.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Verify Rust version
        run: |
          rustc --version
          # Debe mostrar rustc 1.77.0 — si muestra >= 1.78 el build fallará
          RUST_MAJOR=$(rustc --version | grep -oP '\d+\.\d+' | head -1)
          echo "Rust version: $RUST_MAJOR"

      - name: Cache Rust / Cargo + anchor-cli binary
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin/anchor
            target/
          key: ${{ runner.os }}-rust-${{ env.RUST_VERSION }}-anchor-${{ env.ANCHOR_VERSION }}-${{ hashFiles('**/Cargo.lock') }}-v5

      # Crear dirs con permisos del usuario ANTES de instalar Solana
      - name: Pre-create Solana dirs
        run: |
          mkdir -p $HOME/.local/bin
          mkdir -p $HOME/.cache/solana
          mkdir -p $HOME/.local/share/solana
          chmod -R 755 $HOME/.cache/solana
          chmod -R 755 $HOME/.local/share/solana

      - name: Install Solana CLI
        run: |
          curl -sSfL \
            "https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2" \
            | tar -jxf - -C /tmp

          # -r para incluir subdirectorios (deps/ perf-libs/ sdk/)
          cp -r /tmp/solana-release/bin/* $HOME/.local/bin/

          echo "$HOME/.local/bin" >> $GITHUB_PATH
          $HOME/.local/bin/solana --version

      # Instalar anchor-cli desde crates.io con Rust 1.77.0 ya activo
      # SIN --locked para permitir que Cargo resuelva time a versión compatible
      - name: Install Anchor CLI
        run: |
          if [ -f "$HOME/.cargo/bin/anchor" ]; then
            echo "✅ Anchor ya está cacheado"
            $HOME/.cargo/bin/anchor --version
          else
            echo "Instalando anchor-cli v${ANCHOR_VERSION}..."
            # Sin --locked: permite resolver time a versión compatible con Rust 1.77
            cargo install anchor-cli --version ${ANCHOR_VERSION} --force
          fi
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Verify all tools
        run: |
          echo "=== Rust ===" && rustc --version
          echo "=== Cargo ===" && cargo --version
          echo "=== Solana ===" && solana --version
          echo "=== Anchor ===" && anchor --version

      - name: Install Node dependencies
        run: yarn install

      - name: Generate CI keypair and sync Program ID
        run: |
          solana-keygen new --no-bip39-passphrase --outfile /tmp/ci-wallet.json
          PROGRAM_ID=$(solana-keygen pubkey /tmp/ci-wallet.json)
          echo "Program ID: $PROGRAM_ID"

          sed -i "s/declare_id!(\".*\")/declare_id!(\"$PROGRAM_ID\")/g" \
            programs/mampostera/src/lib.rs
          sed -i "s/mampostera = \".*\"/mampostera = \"$PROGRAM_ID\"/g" \
            Anchor.toml

          echo "ANCHOR_WALLET=/tmp/ci-wallet.json" >> $GITHUB_ENV
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_ENV
          solana config set --url localhost

      - name: Fix ownership before build
        run: |
          sudo chown -R "$(id -u):$(id -g)" "$HOME/.cache" || true
          sudo chown -R "$(id -u):$(id -g)" "$HOME/.local" || true
          sudo chown -R "$(id -u):$(id -g)" "$HOME/.cargo" || true

      - name: Build Anchor program
        run: anchor build

      - name: Verify IDL
        run: |
          if [ -f target/idl/mampostera.json ]; then
            echo "✅ IDL generado"
            python3 -c "
          import json
          d = json.load(open('target/idl/mampostera.json'))
          print(f'Instrucciones: {len(d[\"instructions\"])}')
          " 2>/dev/null || echo "IDL parse skipped"
          else
            echo "⚠️ IDL no encontrado"
          fi

      - name: Run tests
        run: anchor test --skip-deploy
        env:
          ANCHOR_WALLET: /tmp/ci-wallet.json

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mampostera-build-${{ github.sha }}
          path: |
            target/idl/mampostera.json
            target/types/mampostera.ts
          retention-days: 14

  # ─── Job 3: Frontend build ─────────────────────────────────────────────────
  build-frontend:
    name: Frontend build (Next.js)
    runs-on: ubuntu-latest
    needs: test-program

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        run: |
          sed -i 's/"@civic\/solana-gateway-react": "\^0.9.10"/"@civic\/solana-gateway-react": "latest"/g' \
            package.json 2>/dev/null || true
          yarn install --no-lockfile
        working-directory: frontend

      - name: TypeScript type check
        run: yarn tsc --noEmit
        working-directory: frontend
        continue-on-error: true

      - name: Build Next.js
        run: yarn build
        working-directory: frontend
        env:
          NEXT_PUBLIC_PROGRAM_ID:       "MAMPoSTERAv2222222222222222222222222222222"
          NEXT_PUBLIC_SOLANA_NETWORK:   "devnet"
          NEXT_PUBLIC_RPC_ENDPOINT:     "https://api.devnet.solana.com"
          NEXT_PUBLIC_AUTHORITY_PUBKEY: "11111111111111111111111111111111"
          NEXT_PUBLIC_CIVIC_GATEKEEPER: "ignREusXmGrscGNUesoU9mxfds9AiYTezUKex2PsZV6"

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: frontend/.next/
          retention-days: 7

  # ─── Job 4: Deploy a Devnet ────────────────────────────────────────────────
  deploy-devnet:
    name: Deploy to Devnet
    runs-on: ubuntu-latest
    needs: [test-program, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: devnet

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.77.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Pre-create Solana dirs
        run: |
          mkdir -p $HOME/.local/bin $HOME/.cache/solana
          chmod -R 755 $HOME/.cache/solana

      - name: Install Solana CLI
        run: |
          curl -sSfL \
            "https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2" \
            | tar -jxf - -C /tmp
          cp -r /tmp/solana-release/bin/* $HOME/.local/bin/
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install anchor-cli --version ${ANCHOR_VERSION} --force
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          anchor --version

      - name: Restore deploy wallet
        run: |
          echo "${{ secrets.DEPLOY_KEYPAIR_JSON }}" > /tmp/deploy-wallet.json
          echo "ANCHOR_WALLET=/tmp/deploy-wallet.json" >> $GITHUB_ENV
          solana config set --url devnet
          solana balance

      - name: Build and deploy to Devnet
        run: |
          anchor build
          anchor deploy --provider.cluster devnet
          PROGRAM_ID=$(solana address -k target/deploy/mampostera-keypair.json)
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_ENV
          echo "✅ https://explorer.solana.com/address/$PROGRAM_ID?cluster=devnet"

      - name: Deploy frontend to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args:       '--prod'
        env:
          NEXT_PUBLIC_PROGRAM_ID:       ${{ env.PROGRAM_ID }}
          NEXT_PUBLIC_SOLANA_NETWORK:   devnet
          NEXT_PUBLIC_RPC_ENDPOINT:     ${{ secrets.HELIUS_RPC_URL }}
          NEXT_PUBLIC_CIVIC_GATEKEEPER: ignREusXmGrscGNUesoU9mxfds9AiYTezUKex2PsZV6

  # ─── Job 5: Deploy a Testnet ───────────────────────────────────────────────
  deploy-testnet:
    name: Deploy to Testnet
    runs-on: ubuntu-latest
    needs: [test-program, build-frontend]
    if: github.ref == 'refs/heads/release' && github.event_name == 'push'
    environment: testnet

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust 1.77.0
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Pre-create Solana dirs
        run: |
          mkdir -p $HOME/.local/bin $HOME/.cache/solana
          chmod -R 755 $HOME/.cache/solana

      - name: Install Solana CLI
        run: |
          curl -sSfL \
            "https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2" \
            | tar -jxf - -C /tmp
          cp -r /tmp/solana-release/bin/* $HOME/.local/bin/
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          cargo install anchor-cli --version ${ANCHOR_VERSION} --force
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          anchor --version

      - name: Restore testnet wallet
        run: |
          echo "${{ secrets.TESTNET_DEPLOY_KEYPAIR_JSON }}" > /tmp/testnet-wallet.json
          echo "ANCHOR_WALLET=/tmp/testnet-wallet.json" >> $GITHUB_ENV
          solana config set --url testnet
          solana balance

      - name: Build and deploy to Testnet
        run: |
          anchor build
          anchor deploy --provider.cluster testnet
          PROGRAM_ID=$(solana address -k target/deploy/mampostera-keypair.json)
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_ENV
          echo "✅ https://explorer.solana.com/address/$PROGRAM_ID?cluster=testnet"

      - name: Publish IDL to Testnet
        run: |
          anchor idl init \
            --filepath target/idl/mampostera.json \
            $(solana address -k target/deploy/mampostera-keypair.json) \
            --provider.cluster testnet
          echo "✅ IDL publicado"

      - name: Deploy frontend to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args:       '--prod'
        env:
          NEXT_PUBLIC_PROGRAM_ID:       ${{ env.PROGRAM_ID }}
          NEXT_PUBLIC_SOLANA_NETWORK:   testnet
          NEXT_PUBLIC_RPC_ENDPOINT:     https://api.testnet.solana.com
          NEXT_PUBLIC_CIVIC_GATEKEEPER: ignREusXmGrscGNUesoU9mxfds9AiYTezUKex2PsZV6
