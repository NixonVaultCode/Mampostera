# =============================================================================
#  MAMPOSTERA v0.5.8 — CI/CD Pipeline (USO DE ACCIONES OFICIALES)
# =============================================================================

name: Mampostera CI v0.5.8

on:
  push:
    branches: [main, develop, release]
  pull_request:
    branches: [main]

env:
  SOLANA_VERSION: "1.18.26"
  ANCHOR_VERSION: "0.30.1"
  NODE_VERSION: "20"
  RUST_TOOLCHAIN: "1.80.0"

jobs:
  test-program:
    name: Anchor program tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Instalar Rust de forma profesional
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rust-src

      # 2. Instalar Solana usando una Acción (Evita errores de curl)
      - name: Install Solana
        uses: dmanstet/setup-solana@v1.1.1
        with:
          solana-version: ${{ env.SOLANA_VERSION }}

      # 3. Instalar Anchor usando una Acción (Evita errores de xz/tar)
      - name: Install Anchor
        uses: bridge-xyz/setup-anchor@v2.0.0
        with:
          anchor-version: ${{ env.ANCHOR_VERSION }}

      - name: Install Node Dependencies
        run: yarn install

      - name: Generate CI keypair
        run: |
          solana-keygen new --no-bip39-passphrase --outfile /tmp/ci-wallet.json
          PROGRAM_ID=$(solana-keygen pubkey /tmp/ci-wallet.json)
          sed -i "s/declare_id!(\".*\")/declare_id!(\"$PROGRAM_ID\")/g" programs/mampostera/src/lib.rs
          sed -i "s/mampostera = \".*\"/mampostera = \"$PROGRAM_ID\"/g" Anchor.toml
          echo "ANCHOR_WALLET=/tmp/ci-wallet.json" >> $GITHUB_ENV

      - name: Build & Test
        run: |
          # Corregir permisos de una vez por todas
          sudo chown -R $(whoami):$(id -gn) $HOME ${{ github.workspace }}
          
          # Regenerar lockfile para evitar error v4
          rm -f Cargo.lock
          cargo generate-lockfile
          
          # Build y Test
          anchor build
          anchor test --skip-deploy
        env:
          ANCHOR_WALLET: /tmp/ci-wallet.json
