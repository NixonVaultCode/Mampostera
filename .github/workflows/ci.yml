# =============================================================================
#  MAMPOSTERA v0.5.4 — CI/CD Pipeline — VERSIÓN DEFINITIVA
#
#  PROBLEMA RAÍZ (resuelto de una vez):
#    anchor-cli 0.30.1 tiene time v0.3.29 que no compila con Rust >= 1.78
#    anchor-cli 0.30.1 tiene hashbrown 0.17 que requiere Cargo edition2024 (Rust < 1.78)
#    No existe ninguna versión de Rust stable que satisfaga ambas restricciones.
#
#  SOLUCIÓN DEFINITIVA:
#    Migrar a Anchor 0.31.0:
#      - Tiene time v0.3.36+ (compatible con Rust stable actual)
#      - AVM descarga binarios precompilados desde GitHub (sin compilar desde fuente)
#      - Compatible con Solana 1.18.x y Rust 1.79+
#    El programa Anchor compila igual — 0.30 → 0.31 no requiere cambios en lib.rs
#    Solo actualizar las versiones en Cargo.toml del programa
# =============================================================================

name: Mampostera CI v0.5

on:
  push:
    branches: [main, develop, release]
  pull_request:
    branches: [main]

env:
  SOLANA_VERSION: "1.18.16"
  ANCHOR_VERSION:  "0.31.0"
  NODE_VERSION:    "20"
  # Rust stable (sin pinear versión) — Anchor 0.31.0 es compatible con rustc actual

jobs:
  # ─── Job 1: Auditoría de seguridad ─────────────────────────────────────────
  security-audit:
    name: Security audit (Rust + Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Audit Rust dependencies
        run: |
          cargo install cargo-audit --locked 2>/dev/null || true
          cargo audit --ignore RUSTSEC-2024-0344 --ignore RUSTSEC-2022-0093
        continue-on-error: true

      - name: Audit Node dependencies
        run: npm audit --audit-level=high
        working-directory: frontend
        continue-on-error: true

  # ─── Job 2: Build y test del programa Anchor ───────────────────────────────
  test-program:
    name: Anchor program tests
    runs-on: ubuntu-latest
    needs: security-audit

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-v6

      # Crear directorios con permisos del usuario antes de instalar Solana
      - name: Pre-create Solana dirs
        run: |
          mkdir -p $HOME/.local/bin
          mkdir -p $HOME/.cache/solana
          chmod -R 755 $HOME/.cache/solana

      - name: Install Solana CLI
        run: |
          curl -sSfL \
            "https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2" \
            | tar -jxf - -C /tmp
          cp -r /tmp/solana-release/bin/* $HOME/.local/bin/
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          $HOME/.local/bin/solana --version

      # Anchor 0.31.0: AVM descarga el binario precompilado desde GitHub Releases
      # No compila desde fuente — sin problemas de Rust/time/hashbrown
      - name: Install AVM and Anchor 0.31.0
        run: |
          # Instalar AVM (solo el gestor — compila rápido, sin dependencias problemáticas)
          cargo install --git https://github.com/coral-xyz/anchor \
            --tag v0.31.0 avm --locked --force

          export PATH="$HOME/.cargo/bin:$PATH"

          # AVM 0.31+ descarga binario precompilado de GitHub (no compila)
          # avm install descarga el binario anchor en ~/.cargo/bin/
          # No usa ~/.avm/bin/ cuando se instala con --tag desde git
          avm install ${ANCHOR_VERSION} || true
          avm use ${ANCHOR_VERSION} || true

          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

          # El binario anchor ya está en ~/.cargo/bin/ desde la instalación con --tag
          $HOME/.cargo/bin/anchor --version

      - name: Verify all tools
        run: |
          echo "=== Rust ===" && rustc --version
          echo "=== Solana ===" && solana --version
          echo "=== Anchor ===" && anchor --version

      # Actualizar anchor-lang en el Cargo.toml del programa a 0.31.0
      - name: Update anchor deps to 0.31.0
        run: |
          sed -i 's/anchor-lang.*=.*{.*version.*"0\.30\.[0-9]"/anchor-lang    = { version = "0.31.0"/g' \
            programs/mampostera/Cargo.toml || true
          sed -i 's/anchor-spl.*=.*{.*version.*"0\.30\.[0-9]"/anchor-spl     = { version = "0.31.0"/g' \
            programs/mampostera/Cargo.toml || true
          cat programs/mampostera/Cargo.toml | grep anchor

      - name: Install Node dependencies
        run: yarn install

      - name: Generate CI keypair and sync Program ID
        run: |
          solana-keygen new --no-bip39-passphrase --outfile /tmp/ci-wallet.json
          PROGRAM_ID=$(solana-keygen pubkey /tmp/ci-wallet.json)
          echo "Program ID: $PROGRAM_ID"

          sed -i "s/declare_id!(\".*\")/declare_id!(\"$PROGRAM_ID\")/g" \
            programs/mampostera/src/lib.rs
          sed -i "s/mampostera = \".*\"/mampostera = \"$PROGRAM_ID\"/g" \
            Anchor.toml

          echo "ANCHOR_WALLET=/tmp/ci-wallet.json" >> $GITHUB_ENV
          solana config set --url localhost

      - name: Fix ownership before build
        run: |
          sudo chown -R "$(id -u):$(id -g)" "$HOME/.cache" || true
          sudo chown -R "$(id -u):$(id -g)" "$HOME/.local" || true
          sudo chown -R "$(id -u):$(id -g)" "$HOME/.cargo" || true
          sudo chown -R "$(id -u):$(id -g)" "$HOME/.avm" 2>/dev/null || true

      - name: Build Anchor program
        run: anchor build

      - name: Verify IDL
        run: |
          if [ -f target/idl/mampostera.json ]; then
            echo "✅ IDL generado"
            python3 -c "
          import json
          d = json.load(open('target/idl/mampostera.json'))
          print(f'Instrucciones: {len(d[\"instructions\"])}')
          " 2>/dev/null || echo "IDL parse skipped"
          else
            echo "⚠️ IDL no encontrado"
          fi

      - name: Run tests
        run: anchor test --skip-deploy
        env:
          ANCHOR_WALLET: /tmp/ci-wallet.json

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mampostera-build-${{ github.sha }}
          path: |
            target/idl/mampostera.json
            target/types/mampostera.ts
          retention-days: 14

  # ─── Job 3: Frontend build ─────────────────────────────────────────────────
  build-frontend:
    name: Frontend build (Next.js)
    runs-on: ubuntu-latest
    needs: test-program

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        run: |
          sed -i 's/"@civic\/solana-gateway-react": "\^0.9.10"/"@civic\/solana-gateway-react": "latest"/g' \
            package.json 2>/dev/null || true
          yarn install --no-lockfile
        working-directory: frontend

      - name: TypeScript type check
        run: yarn tsc --noEmit
        working-directory: frontend
        continue-on-error: true

      - name: Build Next.js
        run: yarn build
        working-directory: frontend
        env:
          NEXT_PUBLIC_PROGRAM_ID:       "MAMPoSTERAv2222222222222222222222222222222"
          NEXT_PUBLIC_SOLANA_NETWORK:   "devnet"
          NEXT_PUBLIC_RPC_ENDPOINT:     "https://api.devnet.solana.com"
          NEXT_PUBLIC_AUTHORITY_PUBKEY: "11111111111111111111111111111111"
          NEXT_PUBLIC_CIVIC_GATEKEEPER: "ignREusXmGrscGNUesoU9mxfds9AiYTezUKex2PsZV6"

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: frontend/.next/
          retention-days: 7

  # ─── Job 4: Deploy a Devnet ────────────────────────────────────────────────
  deploy-devnet:
    name: Deploy to Devnet
    runs-on: ubuntu-latest
    needs: [test-program, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: devnet

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Pre-create Solana dirs
        run: |
          mkdir -p $HOME/.local/bin $HOME/.cache/solana
          chmod -R 755 $HOME/.cache/solana

      - name: Install Solana CLI
        run: |
          curl -sSfL \
            "https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2" \
            | tar -jxf - -C /tmp
          cp -r /tmp/solana-release/bin/* $HOME/.local/bin/
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Anchor 0.31.0
        run: |
          cargo install --git https://github.com/coral-xyz/anchor \
            --tag v0.31.0 avm --locked --force
          export PATH="$HOME/.cargo/bin:$PATH"
          avm install ${ANCHOR_VERSION} || true
          avm use ${ANCHOR_VERSION} || true
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Restore deploy wallet
        run: |
          echo "${{ secrets.DEPLOY_KEYPAIR_JSON }}" > /tmp/deploy-wallet.json
          echo "ANCHOR_WALLET=/tmp/deploy-wallet.json" >> $GITHUB_ENV
          solana config set --url devnet
          solana balance

      - name: Build and deploy to Devnet
        run: |
          anchor build
          anchor deploy --provider.cluster devnet
          PROGRAM_ID=$(solana address -k target/deploy/mampostera-keypair.json)
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_ENV
          echo "✅ https://explorer.solana.com/address/$PROGRAM_ID?cluster=devnet"

      - name: Deploy frontend to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args:       '--prod'
        env:
          NEXT_PUBLIC_PROGRAM_ID:       ${{ env.PROGRAM_ID }}
          NEXT_PUBLIC_SOLANA_NETWORK:   devnet
          NEXT_PUBLIC_RPC_ENDPOINT:     ${{ secrets.HELIUS_RPC_URL }}
          NEXT_PUBLIC_CIVIC_GATEKEEPER: ignREusXmGrscGNUesoU9mxfds9AiYTezUKex2PsZV6

  # ─── Job 5: Deploy a Testnet ───────────────────────────────────────────────
  deploy-testnet:
    name: Deploy to Testnet
    runs-on: ubuntu-latest
    needs: [test-program, build-frontend]
    if: github.ref == 'refs/heads/release' && github.event_name == 'push'
    environment: testnet

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Pre-create Solana dirs
        run: |
          mkdir -p $HOME/.local/bin $HOME/.cache/solana
          chmod -R 755 $HOME/.cache/solana

      - name: Install Solana CLI
        run: |
          curl -sSfL \
            "https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2" \
            | tar -jxf - -C /tmp
          cp -r /tmp/solana-release/bin/* $HOME/.local/bin/
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install Anchor 0.31.0
        run: |
          cargo install --git https://github.com/coral-xyz/anchor \
            --tag v0.31.0 avm --locked --force
          export PATH="$HOME/.cargo/bin:$PATH"
          avm install ${ANCHOR_VERSION} || true
          avm use ${ANCHOR_VERSION} || true
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Restore testnet wallet
        run: |
          echo "${{ secrets.TESTNET_DEPLOY_KEYPAIR_JSON }}" > /tmp/testnet-wallet.json
          echo "ANCHOR_WALLET=/tmp/testnet-wallet.json" >> $GITHUB_ENV
          solana config set --url testnet
          solana balance

      - name: Build and deploy to Testnet
        run: |
          anchor build
          anchor deploy --provider.cluster testnet
          PROGRAM_ID=$(solana address -k target/deploy/mampostera-keypair.json)
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_ENV
          echo "✅ https://explorer.solana.com/address/$PROGRAM_ID?cluster=testnet"

      - name: Publish IDL
        run: |
          anchor idl init \
            --filepath target/idl/mampostera.json \
            $(solana address -k target/deploy/mampostera-keypair.json) \
            --provider.cluster testnet
          echo "✅ IDL publicado"

      - name: Deploy frontend to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args:       '--prod'
        env:
          NEXT_PUBLIC_PROGRAM_ID:       ${{ env.PROGRAM_ID }}
          NEXT_PUBLIC_SOLANA_NETWORK:   testnet
          NEXT_PUBLIC_RPC_ENDPOINT:     https://api.testnet.solana.com
          NEXT_PUBLIC_CIVIC_GATEKEEPER: ignREusXmGrscGNUesoU9mxfds9AiYTezUKex2PsZV6
