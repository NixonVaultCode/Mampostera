# =============================================================================
#  MAMPOSTERA v0.5.5 — CI/CD Pipeline (FIX: AVM & Permissions)
# =============================================================================

name: Mampostera CI v0.5.5

on:
  push:
    branches: [main, develop, release]
  pull_request:
    branches: [main]

env:
  SOLANA_VERSION: "1.18.16"
  ANCHOR_VERSION:  "0.30.1"
  NODE_VERSION:    "20"
  RUST_TOOLCHAIN:  "stable"

jobs:
  security-audit:
    name: Security audit (Rust + Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache cargo-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-v1
      - name: Audit Rust dependencies
        run: |
          cargo install cargo-audit --locked 2>/dev/null || true
          cargo audit --ignore RUSTSEC-2024-0344 --ignore RUSTSEC-2022-0093
        continue-on-error: true
      - name: Audit Node dependencies (frontend)
        run: npm audit --audit-level=high
        working-directory: frontend
        continue-on-error: true

  test-program:
    name: Anchor program tests (Token-2022)
    runs-on: ubuntu-latest
    needs: security-audit
    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust / Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      # PRE-REQUISITO: Carpetas con permisos totales para evitar Error 13
      - name: Pre-create Solana cache directories
        run: |
          mkdir -p $HOME/.cache/solana
          mkdir -p $HOME/.local/share/solana
          sudo chmod -R 777 $HOME/.cache
          sudo chmod -R 777 $HOME/.local

      - name: Install Solana and Anchor Tools
        run: |
          curl -k -L https://github.com/solana-labs/solana/releases/download/v${{ env.SOLANA_VERSION }}/solana-release-x86_64-unknown-linux-gnu.tar.bz2 | tar jxf - -C /tmp
          mkdir -p $HOME/.local/bin
          cp -r /tmp/solana-release/bin/* $HOME/.local/bin/
          
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          $HOME/.cargo/bin/avm install ${{ env.ANCHOR_VERSION }}
          $HOME/.cargo/bin/avm use ${{ env.ANCHOR_VERSION }}

      - name: Add tools to PATH
        run: |
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          echo "$HOME/.avm/bin" >> $GITHUB_PATH
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Dependencies
        run: yarn install

      - name: Generate CI keypair and sync Program ID
        run: |
          solana-keygen new --no-bip39-passphrase --outfile /tmp/ci-wallet.json
          PROGRAM_ID=$(solana-keygen pubkey /tmp/ci-wallet.json)
          sed -i "s/declare_id!(\".*\")/declare_id!(\"$PROGRAM_ID\")/g" programs/mampostera/src/lib.rs
          sed -i "s/mampostera = \".*\"/mampostera = \"$PROGRAM_ID\"/g" Anchor.toml
          echo "ANCHOR_WALLET=/tmp/ci-wallet.json" >> $GITHUB_ENV
          solana config set --url localhost

      # 1. FIX DE PERMISOS: Aseguramos que el runner sea dueño de su HOME y el workspace
      - name: Final ownership fix
        run: sudo chown -R $(whoami):$(id -gn) $HOME ${{ github.workspace }}

      # 2. BUILD CON REGENERACIÓN DE LOCKFILE
      - name: Build programa Anchor (Token-2022)
        run: |
          # Asegurar versión de Anchor
          avm use ${{ env.ANCHOR_VERSION }}
          
          # Borrar el lockfile "del futuro" v4
          rm -f Cargo.lock
          
          # Generar un lockfile compatible con el Rust del Runner
          cargo generate-lockfile
          
          # Compilar
          anchor build
        env:
          # Variable de seguridad para compatibilidad de versiones
          CARGO_RESOLVER_INCOMPATIBLE_RUST_VERSIONS: allow

      - name: Run all tests
        run: anchor test --skip-deploy
        env:
          ANCHOR_WALLET: /tmp/ci-wallet.json

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mampostera-build-${{ github.sha }}
          path: |
            target/idl/mampostera.json
            target/types/mampostera.ts
            .anchor/

  # Los jobs de build-frontend, deploy-devnet y deploy-testnet se mantienen igual
  # pero asegúrate de que usen la misma lógica de instalación sin el home-override.
