# =============================================================================
#  MAMPOSTERA v0.5.4 — CI/CD Pipeline — VERSIÓN DEFINITIVA COMPLETA
#
#  Fixes acumulados:
#  1. Permission denied platform-tools → pre-crear dirs sin sudo
#  2. Anchor version not set → PATH separado por steps
#  3. cp sin -r → cp -r para subdirectorios de Solana
#  4. AVM --tag / anchor-cli no compila → anchor-cli 0.31.0 con AVM
#  5. time v0.3.29 + hashbrown edition2024 → Anchor 0.31.0 (binario precompilado)
#  6. .avm/bin/anchor no existe → binario en .cargo/bin/
#  7. zeroize conflict → NO modificar Cargo.toml del programa
#  8. Cargo.lock v4 incompatible → eliminar antes del build
#  9. solana-program dep directa → remover con sed antes del build
# 10. anchor-lang vs CLI version mismatch → [toolchain] en Anchor.toml
# =============================================================================

name: Mampostera CI v0.5

on:
  push:
    branches: [main, develop, release]
  pull_request:
    branches: [main]

env:
  SOLANA_VERSION: "1.18.16"
  ANCHOR_VERSION:  "0.31.0"
  NODE_VERSION:    "20"

jobs:
  # ─── Job 1: Auditoría de seguridad ─────────────────────────────────────────
  security-audit:
    name: Security audit (Rust + Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Audit Rust dependencies
        run: |
          cargo install cargo-audit --locked 2>/dev/null || true
          cargo audit --ignore RUSTSEC-2024-0344 --ignore RUSTSEC-2022-0093
        continue-on-error: true

      - name: Audit Node dependencies
        run: npm audit --audit-level=high
        working-directory: frontend
        continue-on-error: true

  # ─── Job 2: Build y test del programa Anchor ───────────────────────────────
  test-program:
    name: Anchor program tests
    runs-on: ubuntu-latest
    needs: security-audit

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ env.ANCHOR_VERSION }}-v7

      - name: Pre-create Solana dirs
        run: |
          mkdir -p $HOME/.local/bin
          mkdir -p $HOME/.cache/solana
          chmod -R 755 $HOME/.cache/solana

      - name: Install Solana CLI
        run: |
          curl -sSfL \
            "https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2" \
            | tar -jxf - -C /tmp
          cp -r /tmp/solana-release/bin/* $HOME/.local/bin/
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          $HOME/.local/bin/solana --version

      # AVM 0.31.0 instala anchor como binario precompilado desde GitHub Releases
      # El binario queda en ~/.cargo/bin/anchor (NO en ~/.avm/bin/)
      - name: Install AVM + Anchor CLI 0.31.0
        run: |
          cargo install --git https://github.com/coral-xyz/anchor \
            --tag v0.31.0 avm --locked --force
          export PATH="$HOME/.cargo/bin:$PATH"
          avm install ${ANCHOR_VERSION}
          avm use ${ANCHOR_VERSION}
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          $HOME/.cargo/bin/anchor --version

      - name: Verify all tools
        run: |
          echo "Rust:   $(rustc --version)"
          echo "Solana: $(solana --version)"
          echo "Anchor: $(anchor --version)"

      - name: Install Node dependencies
        run: yarn install

      - name: Prepare build environment
        run: |
          # ── Generar keypair CI y sincronizar Program ID ──────────────────
          solana-keygen new --no-bip39-passphrase --outfile /tmp/ci-wallet.json
          PROGRAM_ID=$(solana-keygen pubkey /tmp/ci-wallet.json)
          echo "Program ID: $PROGRAM_ID"

          sed -i "s/declare_id!(\".*\")/declare_id!(\"$PROGRAM_ID\")/g" \
            programs/mampostera/src/lib.rs
          sed -i "s/mampostera = \".*\"/mampostera = \"$PROGRAM_ID\"/g" \
            Anchor.toml

          echo "ANCHOR_WALLET=/tmp/ci-wallet.json" >> $GITHUB_ENV
          solana config set --url localhost

          # ── Fix 10: alinear versión CLI en Anchor.toml ───────────────────
          # Evita el warning "anchor-lang version != CLI version"
          if grep -q "\[toolchain\]" Anchor.toml; then
            sed -i 's/anchor_version = .*/anchor_version = "0.31.0"/' Anchor.toml
          else
            printf '\n[toolchain]\nanchor_version = "0.31.0"\n' >> Anchor.toml
          fi

          # ── Fix 9: eliminar solana-program como dep directa ──────────────
          # anchor-lang ya lo re-exporta; tenerlo duplicado causa conflictos
          sed -i '/^solana-program/d' programs/mampostera/Cargo.toml || true

          # ── Fix 8: eliminar Cargo.lock incompatible ───────────────────────
          # Cargo.lock v4 se genera con nightly y no es legible por stable
          rm -f Cargo.lock programs/mampostera/Cargo.lock 2>/dev/null || true

          echo "=== Anchor.toml ==="
          cat Anchor.toml
          echo "=== programs/mampostera/Cargo.toml ==="
          cat programs/mampostera/Cargo.toml

      - name: Fix home ownership before build
        run: |
          sudo chown -R "$(id -u):$(id -g)" "$HOME/.cache" || true
          sudo chown -R "$(id -u):$(id -g)" "$HOME/.local" || true
          sudo chown -R "$(id -u):$(id -g)" "$HOME/.cargo" || true

      - name: Build Anchor program
        run: anchor build

      - name: Verify IDL
        run: |
          if [ -f target/idl/mampostera.json ]; then
            echo "✅ IDL generado"
            python3 -c "
          import json
          d = json.load(open('target/idl/mampostera.json'))
          print(f'Instrucciones: {len(d[\"instructions\"])}')
          " 2>/dev/null || true
          else
            echo "⚠️ IDL no encontrado"
          fi

      - name: Run tests
        run: anchor test --skip-deploy
        env:
          ANCHOR_WALLET: /tmp/ci-wallet.json

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mampostera-build-${{ github.sha }}
          path: |
            target/idl/mampostera.json
            target/types/mampostera.ts
          retention-days: 14

  # ─── Job 3: Frontend build ─────────────────────────────────────────────────
  build-frontend:
    name: Frontend build (Next.js)
    runs-on: ubuntu-latest
    needs: test-program

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        run: |
          sed -i 's/"@civic\/solana-gateway-react": "\^0.9.10"/"@civic\/solana-gateway-react": "latest"/g' \
            package.json 2>/dev/null || true
          yarn install --no-lockfile
        working-directory: frontend

      - name: TypeScript type check
        run: yarn tsc --noEmit
        working-directory: frontend
        continue-on-error: true

      - name: Build Next.js
        run: yarn build
        working-directory: frontend
        env:
          NEXT_PUBLIC_PROGRAM_ID:       "MAMPoSTERAv2222222222222222222222222222222"
          NEXT_PUBLIC_SOLANA_NETWORK:   "devnet"
          NEXT_PUBLIC_RPC_ENDPOINT:     "https://api.devnet.solana.com"
          NEXT_PUBLIC_AUTHORITY_PUBKEY: "11111111111111111111111111111111"
          NEXT_PUBLIC_CIVIC_GATEKEEPER: "ignREusXmGrscGNUesoU9mxfds9AiYTezUKex2PsZV6"

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: frontend/.next/
          retention-days: 7

  # ─── Job 4: Deploy a Devnet ────────────────────────────────────────────────
  deploy-devnet:
    name: Deploy to Devnet
    runs-on: ubuntu-latest
    needs: [test-program, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: devnet

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Pre-create Solana dirs
        run: |
          mkdir -p $HOME/.local/bin $HOME/.cache/solana
          chmod -R 755 $HOME/.cache/solana

      - name: Install Solana CLI
        run: |
          curl -sSfL \
            "https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2" \
            | tar -jxf - -C /tmp
          cp -r /tmp/solana-release/bin/* $HOME/.local/bin/
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install AVM + Anchor CLI 0.31.0
        run: |
          cargo install --git https://github.com/coral-xyz/anchor \
            --tag v0.31.0 avm --locked --force
          export PATH="$HOME/.cargo/bin:$PATH"
          avm install ${ANCHOR_VERSION}
          avm use ${ANCHOR_VERSION}
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Prepare Cargo.toml for deploy
        run: |
          sed -i '/^solana-program/d' programs/mampostera/Cargo.toml || true
          rm -f Cargo.lock 2>/dev/null || true
          if grep -q "\[toolchain\]" Anchor.toml; then
            sed -i 's/anchor_version = .*/anchor_version = "0.31.0"/' Anchor.toml
          else
            printf '\n[toolchain]\nanchor_version = "0.31.0"\n' >> Anchor.toml
          fi

      - name: Restore deploy wallet
        run: |
          echo "${{ secrets.DEPLOY_KEYPAIR_JSON }}" > /tmp/deploy-wallet.json
          echo "ANCHOR_WALLET=/tmp/deploy-wallet.json" >> $GITHUB_ENV
          solana config set --url devnet
          solana balance

      - name: Build and deploy to Devnet
        run: |
          anchor build
          anchor deploy --provider.cluster devnet
          PROGRAM_ID=$(solana address -k target/deploy/mampostera-keypair.json)
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_ENV
          echo "✅ https://explorer.solana.com/address/$PROGRAM_ID?cluster=devnet"

      - name: Deploy frontend to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args:       '--prod'
        env:
          NEXT_PUBLIC_PROGRAM_ID:       ${{ env.PROGRAM_ID }}
          NEXT_PUBLIC_SOLANA_NETWORK:   devnet
          NEXT_PUBLIC_RPC_ENDPOINT:     ${{ secrets.HELIUS_RPC_URL }}
          NEXT_PUBLIC_CIVIC_GATEKEEPER: ignREusXmGrscGNUesoU9mxfds9AiYTezUKex2PsZV6

  # ─── Job 5: Deploy a Testnet ───────────────────────────────────────────────
  deploy-testnet:
    name: Deploy to Testnet
    runs-on: ubuntu-latest
    needs: [test-program, build-frontend]
    if: github.ref == 'refs/heads/release' && github.event_name == 'push'
    environment: testnet

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Pre-create Solana dirs
        run: |
          mkdir -p $HOME/.local/bin $HOME/.cache/solana
          chmod -R 755 $HOME/.cache/solana

      - name: Install Solana CLI
        run: |
          curl -sSfL \
            "https://github.com/solana-labs/solana/releases/download/v${SOLANA_VERSION}/solana-release-x86_64-unknown-linux-gnu.tar.bz2" \
            | tar -jxf - -C /tmp
          cp -r /tmp/solana-release/bin/* $HOME/.local/bin/
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install AVM + Anchor CLI 0.31.0
        run: |
          cargo install --git https://github.com/coral-xyz/anchor \
            --tag v0.31.0 avm --locked --force
          export PATH="$HOME/.cargo/bin:$PATH"
          avm install ${ANCHOR_VERSION}
          avm use ${ANCHOR_VERSION}
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Prepare Cargo.toml for deploy
        run: |
          sed -i '/^solana-program/d' programs/mampostera/Cargo.toml || true
          rm -f Cargo.lock 2>/dev/null || true
          if grep -q "\[toolchain\]" Anchor.toml; then
            sed -i 's/anchor_version = .*/anchor_version = "0.31.0"/' Anchor.toml
          else
            printf '\n[toolchain]\nanchor_version = "0.31.0"\n' >> Anchor.toml
          fi

      - name: Restore testnet wallet
        run: |
          echo "${{ secrets.TESTNET_DEPLOY_KEYPAIR_JSON }}" > /tmp/testnet-wallet.json
          echo "ANCHOR_WALLET=/tmp/testnet-wallet.json" >> $GITHUB_ENV
          solana config set --url testnet
          solana balance

      - name: Build and deploy to Testnet
        run: |
          anchor build
          anchor deploy --provider.cluster testnet
          PROGRAM_ID=$(solana address -k target/deploy/mampostera-keypair.json)
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_ENV
          echo "✅ https://explorer.solana.com/address/$PROGRAM_ID?cluster=testnet"

      - name: Publish IDL
        run: |
          anchor idl init \
            --filepath target/idl/mampostera.json \
            $(solana address -k target/deploy/mampostera-keypair.json) \
            --provider.cluster testnet
          echo "✅ IDL publicado"

      - name: Deploy frontend to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args:       '--prod'
        env:
          NEXT_PUBLIC_PROGRAM_ID:       ${{ env.PROGRAM_ID }}
          NEXT_PUBLIC_SOLANA_NETWORK:   testnet
          NEXT_PUBLIC_RPC_ENDPOINT:     https://api.testnet.solana.com
          NEXT_PUBLIC_CIVIC_GATEKEEPER: ignREusXmGrscGNUesoU9mxfds9AiYTezUKex2PsZV6
