# =============================================================================
#  MAMPOSTERA v0.5.4 — CI/CD Pipeline
#  Jobs: security-audit → test-program → build-frontend
#        → deploy-devnet (main, manual) → deploy-testnet (release, manual)
# =============================================================================

name: Mampostera CI v0.5

on:
  push:
    branches: [main, develop, release]
  pull_request:
    branches: [main]

env:
  SOLANA_VERSION: "1.18.16"
  ANCHOR_VERSION:  "0.30.1"
  NODE_VERSION:    "20"
  RUST_TOOLCHAIN:  "stable"

jobs:
  # ─── Job 1: Auditoría de seguridad ─────────────────────────────────────────
  security-audit:
    name: Security audit (Rust + Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache cargo-audit
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-v1

      - name: Audit Rust dependencies
        run: |
          cargo install cargo-audit --locked 2>/dev/null || true
          cargo audit --ignore RUSTSEC-2024-0344 --ignore RUSTSEC-2022-0093
        continue-on-error: true

      - name: Audit Node dependencies (frontend)
        run: npm audit --audit-level=high
        working-directory: frontend
        continue-on-error: true

  # ─── Job 2: Build y test del programa Anchor ───────────────────────────────
  test-program:
    name: Anchor program tests (Token-2022)
    runs-on: ubuntu-latest
    needs: security-audit

    steps:
      - uses: actions/checkout@v4

      - name: Cache Rust / Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-v2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      # FIX: Pre-crear directorios de Solana con el usuario correcto
      # ANTES de cualquier sudo, para que cargo-build-sbf pueda escribir
      - name: Pre-create Solana cache directories
        run: |
          mkdir -p $HOME/.cache/solana
          mkdir -p $HOME/.local/share/solana
          chmod -R 755 $HOME/.cache/solana
          chmod -R 755 $HOME/.local/share/solana

      - name: Install Solana and Anchor Tools
        run: |
          # 1. Descargar binario oficial sin sudo
          curl -k -L https://github.com/solana-labs/solana/releases/download/v${{ env.SOLANA_VERSION }}/solana-release-x86_64-unknown-linux-gnu.tar.bz2 \
            | tar jxf - -C /tmp

          # 2. Copiar binarios al PATH del usuario (sin sudo)
          mkdir -p $HOME/.local/bin
          cp -r /tmp/solana-release/bin/* $HOME/.local/bin/
          echo "$HOME/.local/bin" >> $GITHUB_PATH

          # 3. Instalar Anchor vía AVM (sin sudo)
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force 2>/dev/null || true
          $HOME/.cargo/bin/avm install ${{ env.ANCHOR_VERSION }}
          $HOME/.cargo/bin/avm use ${{ env.ANCHOR_VERSION }}

          # 4. Verificación
          $HOME/.local/bin/solana --version
          $HOME/.avm/bin/anchor --version

      - name: Add tools to PATH
        run: |
          echo "$HOME/.avm/bin" >> $GITHUB_PATH
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install Dependencies
        run: yarn install

      - name: Generate CI keypair and sync Program ID
        run: |
          $HOME/.local/bin/solana-keygen new --no-bip39-passphrase --outfile /tmp/ci-wallet.json
          PROGRAM_ID=$($HOME/.local/bin/solana-keygen pubkey /tmp/ci-wallet.json)
          echo "Program ID generado: $PROGRAM_ID"

          # Actualizar IDs en el código
          sed -i "s/declare_id!(\".*\")/declare_id!(\"$PROGRAM_ID\")/g" programs/mampostera/src/lib.rs
          sed -i "s/mampostera = \".*\"/mampostera = \"$PROGRAM_ID\"/g" Anchor.toml

          echo "ANCHOR_WALLET=/tmp/ci-wallet.json" >> $GITHUB_ENV
          $HOME/.local/bin/solana config set --url localhost

      # FIX PRINCIPAL: chown COMPLETO del home justo antes del build
      # Cubre cualquier archivo creado por sudo en pasos anteriores
      - name: Fix ownership before build
        run: sudo chown -R $(whoami):$(id -gn) $HOME

      - name: Build programa Anchor (Token-2022)
        run: anchor build
        env:
          # FIX: apuntar platform-tools a un dir con permisos garantizados
          HOME: ${{ github.workspace }}/../home-override
          SOLANA_INSTALL_DIR: ${{ github.workspace }}/../home-override/.local/share/solana

      # Si el override de HOME da problemas, usar este fallback en su lugar:
      # - name: Build programa Anchor (Token-2022) [FALLBACK]
      #   run: |
      #     export CARGO_HOME=$HOME/.cargo
      #     anchor build

      - name: Verificar IDL generado
        run: |
          test -f target/idl/mampostera.json && echo "✅ IDL OK" || echo "⚠️ IDL no generado"
          cat target/idl/mampostera.json | python3 -c \
            "import sys,json; d=json.load(sys.stdin); print(f'Instrucciones: {len(d[\"instructions\"])}')" \
            2>/dev/null || echo "IDL parse skipped"

      - name: Run all tests
        run: anchor test --skip-deploy
        env:
          ANCHOR_WALLET: /tmp/ci-wallet.json

      - name: Upload build artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mampostera-build-${{ github.sha }}
          path: |
            target/idl/mampostera.json
            target/types/mampostera.ts
            .anchor/
          retention-days: 14

  # ─── Job 3: Frontend build ─────────────────────────────────────────────────
  build-frontend:
    name: Frontend build (Next.js 14 + Solana)
    runs-on: ubuntu-latest
    needs: test-program

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install frontend dependencies
        run: |
          sed -i 's/"@civic\/solana-gateway-react": "\^0.9.10"/"@civic\/solana-gateway-react": "latest"/g' package.json
          yarn install --no-lockfile
        working-directory: frontend

      - name: TypeScript type check
        run: yarn tsc --noEmit
        working-directory: frontend
        continue-on-error: true

      - name: Build Next.js
        run: yarn build
        working-directory: frontend
        env:
          NEXT_PUBLIC_PROGRAM_ID:       "MAMPoSTERAv2222222222222222222222222222222"
          NEXT_PUBLIC_SOLANA_NETWORK:   "devnet"
          NEXT_PUBLIC_RPC_ENDPOINT:     "https://api.devnet.solana.com"
          NEXT_PUBLIC_AUTHORITY_PUBKEY: "11111111111111111111111111111111"
          NEXT_PUBLIC_CIVIC_GATEKEEPER: "ignREusXmGrscGNUesoU9mxfds9AiYTezUKex2PsZV6"

      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-${{ github.sha }}
          path: frontend/.next/
          retention-days: 7

  # ─── Job 4: Deploy a Devnet (push a main) ──────────────────────────────────
  deploy-devnet:
    name: Deploy to Devnet
    runs-on: ubuntu-latest
    needs: [test-program, build-frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: devnet

    steps:
      - uses: actions/checkout@v4

      - name: Pre-create Solana cache directories
        run: |
          mkdir -p $HOME/.cache/solana
          mkdir -p $HOME/.local/bin
          chmod -R 755 $HOME/.cache/solana

      - name: Setup Solana CLI + Anchor
        run: |
          curl -k -L https://github.com/solana-labs/solana/releases/download/v${{ env.SOLANA_VERSION }}/solana-release-x86_64-unknown-linux-gnu.tar.bz2 \
            | tar jxf - -C /tmp
          cp -r /tmp/solana-release/bin/* $HOME/.local/bin/
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force 2>/dev/null || true
          $HOME/.cargo/bin/avm install ${{ env.ANCHOR_VERSION }}
          $HOME/.cargo/bin/avm use ${{ env.ANCHOR_VERSION }}
          echo "$HOME/.avm/bin" >> $GITHUB_PATH
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Restore wallet de deploy
        run: |
          echo "${{ secrets.DEPLOY_KEYPAIR_JSON }}" > /tmp/deploy-wallet.json
          echo "ANCHOR_WALLET=/tmp/deploy-wallet.json" >> $GITHUB_ENV
          solana config set --url devnet
          solana balance

      - name: Build y deploy a Devnet
        run: |
          anchor build
          anchor deploy --provider.cluster devnet
          PROGRAM_ID=$(solana address -k target/deploy/mampostera-keypair.json)
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_ENV
          echo "✅ Devnet: $PROGRAM_ID"
          echo "https://explorer.solana.com/address/$PROGRAM_ID?cluster=devnet"

      - name: Deploy frontend a Vercel (devnet)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args:       '--prod'
        env:
          NEXT_PUBLIC_PROGRAM_ID:       ${{ env.PROGRAM_ID }}
          NEXT_PUBLIC_SOLANA_NETWORK:   devnet
          NEXT_PUBLIC_RPC_ENDPOINT:     ${{ secrets.HELIUS_RPC_URL }}
          NEXT_PUBLIC_CIVIC_GATEKEEPER: ignREusXmGrscGNUesoU9mxfds9AiYTezUKex2PsZV6

  # ─── Job 5: Deploy a Testnet (rama release) ────────────────────────────────
  deploy-testnet:
    name: Deploy to Testnet
    runs-on: ubuntu-latest
    needs: [test-program, build-frontend]
    if: github.ref == 'refs/heads/release' && github.event_name == 'push'
    environment: testnet

    steps:
      - uses: actions/checkout@v4

      - name: Pre-create Solana cache directories
        run: |
          mkdir -p $HOME/.cache/solana
          mkdir -p $HOME/.local/bin
          chmod -R 755 $HOME/.cache/solana

      - name: Setup Solana CLI + Anchor
        run: |
          curl -k -L https://github.com/solana-labs/solana/releases/download/v${{ env.SOLANA_VERSION }}/solana-release-x86_64-unknown-linux-gnu.tar.bz2 \
            | tar jxf - -C /tmp
          cp -r /tmp/solana-release/bin/* $HOME/.local/bin/
          echo "$HOME/.local/bin" >> $GITHUB_PATH
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force 2>/dev/null || true
          $HOME/.cargo/bin/avm install ${{ env.ANCHOR_VERSION }}
          $HOME/.cargo/bin/avm use ${{ env.ANCHOR_VERSION }}
          echo "$HOME/.avm/bin" >> $GITHUB_PATH
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Restore wallet testnet
        run: |
          echo "${{ secrets.TESTNET_DEPLOY_KEYPAIR_JSON }}" > /tmp/testnet-wallet.json
          echo "ANCHOR_WALLET=/tmp/testnet-wallet.json" >> $GITHUB_ENV
          solana config set --url testnet
          solana balance

      - name: Build y deploy a Testnet
        run: |
          anchor build
          anchor deploy --provider.cluster testnet
          PROGRAM_ID=$(solana address -k target/deploy/mampostera-keypair.json)
          echo "PROGRAM_ID=$PROGRAM_ID" >> $GITHUB_ENV
          echo "✅ Testnet: $PROGRAM_ID"
          echo "https://explorer.solana.com/address/$PROGRAM_ID?cluster=testnet"

      - name: Publicar IDL en testnet
        run: |
          anchor idl init \
            --filepath target/idl/mampostera.json \
            $(solana address -k target/deploy/mampostera-keypair.json) \
            --provider.cluster testnet
          echo "✅ IDL publicado en testnet"

      - name: Deploy frontend a Vercel (testnet)
        uses: amondnet/vercel-action@v25
        with:
          vercel-token:      ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id:     ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: ./frontend
          vercel-args:       '--prod'
        env:
          NEXT_PUBLIC_PROGRAM_ID:       ${{ env.PROGRAM_ID }}
          NEXT_PUBLIC_SOLANA_NETWORK:   testnet
          NEXT_PUBLIC_RPC_ENDPOINT:     https://api.testnet.solana.com
          NEXT_PUBLIC_CIVIC_GATEKEEPER: ignREusXmGrscGNUesoU9mxfds9AiYTezUKex2PsZV6
