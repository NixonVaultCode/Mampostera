# =============================================================================
#  MAMPOSTERA v0.5.9 — CI/CD Pipeline (BACK TO BASICS - NO THIRD PARTY ACTIONS)
# =============================================================================

name: Mampostera CI v0.5.9

on:
  push:
    branches: [main, develop, release]
  pull_request:
    branches: [main]

env:
  SOLANA_VERSION: "1.18.26"
  ANCHOR_VERSION: "0.30.1"
  NODE_VERSION: "20"
  RUST_TOOLCHAIN: "1.79.0"

jobs:
  test-program:
    name: Anchor program tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: rust-src

      - name: Install Dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config build-essential libudev-dev libssl-dev

      - name: Install Solana CLI
        run: |
          # Usamos el instalador oficial con reintentos para evitar el error de SSL
          curl -sSfL --retry 3 https://release.solana.com/v${{ env.SOLANA_VERSION }}/install | sh
          echo "$HOME/.local/share/solana/install/active_release/bin" >> $GITHUB_PATH

      - name: Install Anchor CLI
        run: |
          # Instalamos avm pero SIN COMPILAR dependencias pesadas, bajando el binario directo si es posible
          # O instalando la versión estable que no pide edition2024
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          $HOME/.cargo/bin/avm install ${{ env.ANCHOR_VERSION }}
          $HOME/.cargo/bin/avm use ${{ env.ANCHOR_VERSION }}
          echo "$HOME/.avm/bin" >> $GITHUB_PATH

      - name: Install Node Deps
        run: yarn install

      - name: Build & Test
        run: |
          # 1. Fix de permisos para evitar el Error 13
          sudo chown -R $(whoami):$(id -gn) $HOME ${{ github.workspace }}
          
          # 2. Keypair para el deploy local de los tests
          solana-keygen new --no-bip39-passphrase --outfile /tmp/id.json
          
          # 3. Limpieza de lockfile para evitar el error de versión v4
          rm -f Cargo.lock
          cargo generate-lockfile
          
          # 4. Build y Test
          anchor build
          anchor test --skip-deploy
        env:
          ANCHOR_WALLET: /tmp/id.json
